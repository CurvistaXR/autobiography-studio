  <title id="title">Autobiography typographic cover template</title>
  <desc id="desc">A restrained book cover with a life-line motif and editable text placeholders.</desc>
  <rect width="1600" height="2560" fill="#F2EEE6"/>
  <path d="M210 360 C460 520 370 850 610 1020 S1040 1260 920 1540 S830 1980 1390 2180" fill="none" stroke="#9D3C32" stroke-width="18" stroke-linecap="round"/>
  <circle cx="210" cy="360" r="28" fill="#9D3C32"/>
  <circle cx="1390" cy="2180" r="28" fill="#9D3C32"/>
  <text x="190" y="850" fill="#1F2933" font-family="Noto Serif SC, Source Han Serif SC, serif" font-size="150" font-weight="700">{{TITLE}}</text>
  <text x="196" y="1015" fill="#59636E" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="58">{{SUBTITLE}}</text>
